<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lietome Live 🚀</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9fafb;
    }

    h1 {
      margin-bottom: 10px;
    }

    #controls {
      margin-bottom: 15px;
    }

    #chat {
      border: 1px solid #ddd;
      background: white;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    #chat div {
      margin-bottom: 6px;
    }

    input, select, button {
      padding: 6px;
      margin-right: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      border: none;
    }

    button:hover {
      background: #1d4ed8;
    }

    form {
      display: flex;
    }

    #message {
      flex: 1;
    }
  </style>
</head>

<body>

  <h1>Lietome Live 🚀</h1>

  <!-- ===================== -->
  <!-- CONTROLS -->
  <!-- ===================== -->

  <div id="controls">
    <input id="username" placeholder="Pseudo" />

    <select id="project">
      <option value="">-- Choisir un projet --</option>
      <option value="Ever">Ever</option>
    
      <option value="SensiLab">SensiLab</option>
    </select>

    <button id="join">Rejoindre</button>
  </div>

  <!-- ===================== -->
  <!-- CHAT -->
  <!-- ===================== -->

  <div id="chat"></div>

  <!-- ===================== -->
  <!-- MESSAGE FORM -->
  <!-- ===================== -->

  <form id="chat-form">
    <input id="message" placeholder="Votre message..." autocomplete="off" />
    <button type="submit">Envoyer</button>
  </form>

  <!-- ===================== -->
  <!-- SCRIPTS -->
  <!-- ===================== -->

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>

</body>
</html>
