<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sensi-IA_travail_collaboratif</title>

  <style>
    body{ font-family: Arial, sans-serif; margin:20px; max-width:1100px; }
    h1{ margin-bottom: 10px; }
    input, select, button{ padding:8px; font-size:14px; }
    button{ cursor:pointer; }
    .topbar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
    .hint{ color:#666; font-size:12px; margin:6px 0 12px; }
    .layout{ display:grid; grid-template-columns:1fr 260px; gap:12px; align-items:start; }
    @media (max-width: 900px){ .layout{ grid-template-columns:1fr; } }
    #chat{ border:1px solid #ccc; height:460px; overflow-y:auto; padding:10px; background:#fff; }
    .msg{ margin-bottom:8px; line-height:1.35; word-break:break-word; }
    .msg .time{ color:#666; margin-right:6px; font-size:12px; }
    .msg.system{ color:#444; opacity:0.9; }
    form#chat-form{ display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap; }
    #message{ flex:1; min-width:220px; }
    #file{ max-width:340px; }
    .upload-state{ font-size:12px; color:#666; }
    .panel{ border:1px solid #ccc; background:#fff; padding:10px; border-radius:10px; }
    .panel h3{ margin:0 0 8px 0; font-size:15px; }
    .badge{ display:inline-block; padding:2px 8px; border:1px solid #ddd; border-radius:999px; font-size:12px; color:#444; margin-left:6px; }
    #users{ list-style:none; padding:0; margin:0; }
    #users li{ padding:6px 8px; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; gap:8px; align-items:center; }
    #users li:last-child{ border-bottom:none; }
    .danger{ border:1px solid #f2b8b5; background:#fff5f5; }
    #statusbar{ margin:8px 0 12px; padding:8px 10px; border:1px dashed rgba(0,0,0,.18); border-radius:10px; background:#fff; font-size:12px; color:#444; }
    #statusbar code{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  </style>
</head>

<body>
  <h1>Sensi-IA_travail_collaboratif 🚀</h1>

  <div id="statusbar">
    Statut: <span id="status-text">chargement…</span>
  </div>

  <div class="topbar">
    <input type="text" id="username" placeholder="Pseudo" autocomplete="nickname" />
    <select id="project"></select>
    <button id="join-btn" type="button">Rejoindre</button>
  </div>

  <div class="topbar">
    <input type="text" id="new-project" placeholder="Nouveau projet (ex: EverCell)" />
    <button id="create-project-btn" type="button">+ Créer</button>
    <button id="delete-project-btn" type="button" class="danger">🗑️ Supprimer ce projet</button>
  </div>

  <div class="hint">
    Chat + projets temps réel.<br/>
    🎧 Reconnaissance vocale : dicte ton message et dis <strong>"over"</strong> pour envoyer automatiquement.<br/>
    📊 FFT affichée pendant l'écoute / l'enregistrement.<br/>
    🎙️ Envoi audio : Enregistrer → Envoyer audio.
  </div>

  <div class="layout">
    <div>
      <div id="chat" aria-live="polite"></div>

      <form id="chat-form" autocomplete="off">
        <input type="text" id="message" placeholder="Message..." autocomplete="off" />
        <input type="file" id="file" accept=".pdf,.txt,.docx,.xlsx,image/*,audio/*" />
        <button type="submit">Envoyer</button>
        <span class="upload-state" id="upload-state"></span>
      </form>
    </div>

    <aside class="panel">
      <h3>Users en ligne <span class="badge" id="users-count">—</span></h3>
      <div class="hint" style="margin:0 0 8px;">
        Projet : <strong id="current-project-label">—</strong>
      </div>
      <ul id="users"></ul>
    </aside>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>

  <script>
    (async () => {
      const el = document.getElementById("status-text");
      try {
        const res = await fetch("/health", { cache: "no-store" });
        const data = await res.json();
        el.innerHTML = `OK ✅ | <code>${data.version || "?"}</code> | AI: <code>${data.ai || "?"}</code> | Web: <code>${data.web || ""}</code>`;
      } catch {
        el.textContent = "offline / health unreachable";
      }
    })();
  </script>
</body>
</html>
