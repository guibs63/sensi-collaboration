<script>
const socket = io();
let currentProject = null;

function join() {
  currentProject = document.getElementById("project").value;
  document.getElementById("messages").innerHTML = "";
  socket.emit("joinProject", currentProject);
}

socket.on("projectHistory", (messages) => {
  messages.forEach(msg => addMessage(msg.username, msg.message));
});

socket.on("chatMessage", (data) => {
  addMessage(data.username, data.message);
});

function sendMessage() {
  const username = document.getElementById("username").value;
  const message = document.getElementById("message").value;

  if (!message || !currentProject || !username) return;

  socket.emit("chatMessage", {
    project: currentProject,
    username: username, // 🔥 correspond au serveur
    message: message
  });

  document.getElementById("message").value = "";
}

function addMessage(username, message) {
  const div = document.createElement("div");
  div.innerHTML = "<b>" + username + ":</b> " + message;
  document.getElementById("messages").appendChild(div);
}
</script>
