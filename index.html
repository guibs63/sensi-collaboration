<!-- guibs:/index.html -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensi-Coworking ✨</title>

  <style>
    body { font-family: Arial, sans-serif; background:#fff; margin:0; }
    .wrap { max-width: 980px; margin: 20px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; background:#fff; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    input, select, button { padding: 8px 10px; }
    input, select { border: 1px solid #ddd; border-radius: 6px; }
    button { border: 1px solid #ddd; border-radius: 6px; background:#fff; cursor:pointer; }
    button:hover { filter: brightness(0.98); }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .hint { font-size: 12px; color:#666; }

    /* Chat */
    #chat { margin-top: 12px; min-height: 420px; border: 1px solid #eee; border-radius: 10px; padding: 10px; }
    .msg{
      padding: 10px 6px;
      border-top: 1px solid #eee;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .msg:first-child { border-top:none; }
    .msg-left{ max-width: 85%; overflow-wrap:anywhere; }
    .msg-right{ display:flex; align-items:center; gap:8px; }

    /* ✅ bouton suppression */
    .msg-del{
      cursor:pointer;
      border: 1px solid #ddd;
      background:#fff;
      border-radius:6px;
      padding: 4px 8px;
    }
    .msg-del:hover{ filter: brightness(0.97); }

    .danger { background:#d00; color:#fff; border:none; }
    .danger:hover { filter: brightness(0.95); }

    .form-row { margin-top:14px; }
    #message { flex:1; min-width: 240px; }
    .status { display:flex; align-items:center; gap:8px; }
    .dot { width:10px; height:10px; border-radius:999px; background:#18a558; display:inline-block; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <h2 style="margin:0;">Sensi-Coworking ✨</h2>
      <div class="status"><span class="dot"></span><span>Connecté</span></div>
    </div>

    <div class="card">
      <!-- Ligne pseudo / projet -->
      <div class="row">
        <div>
          <div class="hint">Pseudo</div>
          <input id="username" placeholder="Guibs" />
        </div>

        <div>
          <div class="hint">Projet</div>
          <select id="project"></select>
        </div>

        <button id="join">Rejoindre</button>

        <div style="flex:1"></div>
        <div class="hint">Astuce : change de projet → historique chargé automatiquement</div>
      </div>

      <hr style="border:none;border-top:1px solid #eee;margin:14px 0;" />

      <!-- CRUD projet -->
      <div class="row">
        <div style="flex:1; min-width:260px;">
          <div class="hint">Nouveau projet</div>
          <input id="new-project" placeholder="Ex: EverCell / VIGI-SCREEN" style="width:100%;" />
          <div class="hint">Créer / supprimer sans quitter la page.</div>
        </div>

        <button id="create-project">+ Créer</button>
        <button id="delete-project" class="danger">Supprimer</button>
      </div>

      <!-- Chat -->
      <div id="chat"></div>

      <!-- Form message -->
      <form id="chat-form" class="row form-row">
        <input id="message" placeholder="Écris un message..." autocomplete="off" />
        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>

  <!-- IMPORTANT : client.js est à la racine -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
